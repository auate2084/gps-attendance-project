spring:
  output:
    ansi:
      enabled: ALWAYS
  application:
    name: gps-attendance

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gps_attendance}?currentSchema=${DB_SCHEMA:attendance}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:gps_user}
    password: ${DB_PASSWORD:gps_pass}

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${DB_SCHEMA:attendance}
        hbm2ddl.create_namespaces: true

  sql:
    init:
      mode: always

  security:
    user:
      name: admin
      password: admin

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

jwt:
  secret: gps-attendance-secret-key-for-jwt-token-generation-must-be-long-enough
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
