name: GPSAttendanceiOS
options:
  bundleIdPrefix: com.gpsattendance
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
targets:
  GPSAttendance:
    type: application
    platform: iOS
    sources:
      - path: GPSAttendance
        excludes:
          - Resources/Info.plist
    resources:
      - path: GPSAttendance/Resources
    info:
      path: GPSAttendance/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - gps
        NSLocationWhenInUseUsageDescription: "출퇴근 체크를 위해 현재 위치가 필요합니다."
        NSLocationAlwaysAndWhenInUseUsageDescription: "백그라운드 위치 감지를 위해 항상 위치 권한이 필요합니다."
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.gpsattendance.mobile.ios
      DEVELOPMENT_TEAM: ""
      SWIFT_VERSION: 5.0
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0
      INFOPLIST_KEY_CFBundleDisplayName: GPS Attendance
      CODE_SIGN_STYLE: Automatic
schemes:
  GPSAttendance:
    build:
      targets:
        GPSAttendance: all
    run:
      config: Debug
